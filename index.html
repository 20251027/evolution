<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人主頁 | My Space</title>
    <link rel="me" href="https://g0v.social/@tsmc">
    
    <style>
        /* 基礎質感設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #121214; /* 質感深鐵灰 */
            color: #e2e8f0; /* 柔和白 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 主卡片設計 */
        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* 頭像與名稱 */
        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7); /* 質感漸層微光 */
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8; /* 內斂灰 */
            margin-bottom: 32px;
        }

        /* 連結按鈕區 */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s ease;
        }

        /* 觸控/滑鼠懸停效果 */
        .link-btn:hover, .link-btn:active {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* 底部優雅小字 */
        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #475569;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">M</div>
        
        <h1>Mesh</h1>
        <div class="subtitle">歡迎來到我的個人專空間</div>

        <div class="links-wrapper">
            
            <a class="link-btn" rel="me" href="https://mastodon.social/@1027">
                Mastodon 社群
            </a>
            
            <a class="link-btn" href="https://linktr.ee/mesh_dwitter" target="_blank">
                我的 Linktree
            </a>
            
            </div>

        <div class="footer">© 2026 MESH. ALL RIGHTS RESERVED.</div>
    </div>

</body>
</html>
